{{ define "main" }}
<h1>{{ .Title }}</h1>

{{ $cats := site.Data.categories }}
{{ if not $cats }}
  <p>No categories found. Run <code>node scripts/fetch-sanity.mjs</code>.</p>
{{ else }}
  <div class="grid">
    {{ range $cats }}
      <article class="card">
        <h2><a href="{{ (printf "/categories/%s/" .slug) | relURL }}">{{ .title }}</a></h2>
        {{ with .description }}<p class="meta">{{ . }}</p>{{ end }}
      </article>
    {{ end }}
  </div>
{{ end }}
{{ end }}
